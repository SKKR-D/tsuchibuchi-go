<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>土淵中 全コート状況</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --blue: #3182ce; --red: #e53e3e; --gold: #d69e2e; --text: #c9d1d9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); padding: 10px; }

        /* HEADER */
        .dash-header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 2px solid var(--border); margin-bottom: 15px; }
        .dash-title { font-size: 1.1rem; font-weight: 900; color: var(--gold); display: flex; align-items: center; gap: 8px; }
        .live-badge { background: rgba(229, 62, 62, 0.2); color: #fc8181; padding: 2px 8px; border-radius: 4px; font-family: 'Orbitron', sans-serif; font-size: 0.7rem; font-weight: bold; border: 1px solid #fc8181; }

        /* GRID/LIST CONTAINER */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 15px; }

        /* MATCH CARD */
        .m-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 8px; 
            display: flex; flex-direction: column; cursor: pointer; text-decoration: none; color: inherit;
        }
        
        .mc-top { background: #000; padding: 6px 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 8px 8px 0 0; }
        .mc-court { font-size: 0.85rem; font-weight: 900; color: var(--gold); }
        .mc-stage { font-size: 0.7rem; color: #8b949e; }

        .mc-main { display: flex; align-items: center; padding: 10px; gap: 10px; }
        
        .team-box { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .team-name { font-size: 0.95rem; font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-names { font-size: 0.7rem; color: #8b949e; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* スコア表示 */
        .score-box { display: flex; align-items: center; background: #000; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); }
        .g-num { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; width: 25px; text-align: center; }
        .p-num { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; color: var(--gold); background: #222; padding: 2px 4px; border-radius: 3px; margin-left: 5px; min-width: 18px; text-align: center;}
        .sep { color: #444; font-weight: bold; padding: 0 4px; }

        .c-L { color: var(--blue); }
        .c-R { color: var(--red); }

        @media (max-width: 600px) {
            .grid-container { grid-template-columns: 1fr; gap: 8px; }
            .dash-header { padding: 5px; }
            .team-name { font-size: 0.85rem; }
            .g-num { font-size: 1.2rem; }
            .p-num { font-size: 0.75rem; }
        }
        @media (min-width: 900px) {
            .grid-container { grid-template-columns: repeat(3, 1fr); }
        }

        .footer-info { margin-top: 20px; text-align: center; font-size: 0.7rem; color: #8b949e; }
    </style>
</head>
<body>

    <div class="dash-header">
        <div class="dash-title">
            <span class="live-badge">LIVE</span>
            土淵中 速報ダッシュボード
        </div>
        <div id="d-time" style="font-size: 0.7rem; color: #8b949e;">--:--:-- 更新</div>
    </div>

    <div class="grid-container" id="grid-wrap">
        <div style="text-align: center; padding: 40px; color: #8b949e;">接続中...</div>
    </div>

    <div class="footer-info">
        5秒ごとに自動更新中<br>
        各試合をタップすると詳細画面が開きます
    </div>

    <script>
        // ★ 新しいライブ中継用API URLを適用
        const GAS_URL_LIVE = "https://script.google.com/macros/s/AKfycbxJElyH86BpJK_8LNZydja3uitSCKtGYwI8ll-koOD0skjc_yk58w5RkOlWLyHUKOeZ7g/exec";

        window.onload = () => {
            fetchDashboard();
            setInterval(fetchDashboard, 5000); 
        };

        async function fetchDashboard() {
            try {
                const response = await fetch(`${GAS_URL_LIVE}?all=true`);
                const matches = await response.json();
                renderDashboard(matches);
                const now = new Date();
                document.getElementById('d-time').textContent = now.toLocaleTimeString() + ' 更新';
            } catch (error) {
                console.error("Fetch Error:", error);
            }
        }

        function getCourtShortName(id) {
            if(!id) return '';
            return id.split('_')[1] + 'コート';
        }

        function renderDashboard(matches) {
            const wrap = document.getElementById('grid-wrap');
            const now = Date.now();
            const TIMEOUT_MS = 30 * 60 * 1000; // 30分通信がなければ除外（タイムアウト）

            let activeMatches = matches.filter(S => {
                if (!S.lastUpdate) return false; 
                return (now - S.lastUpdate) < TIMEOUT_MS;
            });

            if (activeMatches.length === 0) {
                wrap.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 50px; color: #8b949e;">現在、進行中の試合はありません</div>`;
                return;
            }

            activeMatches.sort((a, b) => {
                const numA = parseInt(a.meta.court.split('_')[1]) || 0;
                const numB = parseInt(b.meta.court.split('_')[1]) || 0;
                return numA - numB;
            });

            wrap.innerHTML = activeMatches.map(S => {
                const courtName = getCourtShortName(S.meta.court);
                const d = getDisp(S.pL, S.pR, S.isFinal);
                const inf = getServ(S);
                const isSingles = (S.meta.matchType === 'シングルス');
                
                const playersL = isSingles ? S.names.A : `${S.names.A}・${S.names.B}`;
                const playersR = isSingles ? S.names.C : `${S.names.C}・${S.names.D}`;
                
                const sL = (inf.s === 'A' || inf.s === 'B') ? '🎾' : '';
                const sR = (inf.s === 'C' || inf.s === 'D') ? '🎾' : '';

                const detailUrl = `live.html?court=${S.meta.court}`;

                return `
                <a href="${detailUrl}" class="m-card">
                    <div class="mc-top">
                        <span class="mc-court">${courtName}</span>
                        <span class="mc-stage">${S.meta.stage || ''} (${S.meta.matchType})</span>
                    </div>
                    <div class="mc-main">
                        <div class="team-box">
                            <div class="team-name c-L">${S.teams.L}</div>
                            <div class="player-names">${sL}${playersL}</div>
                        </div>
                        
                        <div class="score-box">
                            <div class="g-num c-L">${S.gL}</div>
                            <div class="p-num">${d.l}</div>
                            <div class="sep">-</div>
                            <div class="p-num">${d.r}</div>
                            <div class="g-num c-R">${S.gR}</div>
                        </div>

                        <div class="team-box" style="text-align: right;">
                            <div class="team-name c-R">${S.teams.R}</div>
                            <div class="player-names">${playersR}${sR}</div>
                        </div>
                    </div>
                </a>
                `;
            }).join('');
        }

        function getDisp(l, r, fin) { 
            const border = fin ? 6 : 3; 
            if (l < border || r < border) return { l, r }; 
            if (l === r) return { l: 'D', r: 'D' }; 
            if (l > r) return { l: 'A', r: 'D' }; 
            return { l: 'D', r: 'A' }; 
        }

        function getServ(S) {
            if (!S.sOrder || S.sOrder.length === 0) return { s: 'A' }; 
            if (S.meta.matchType === 'シングルス') {
                const actTeam = (Math.floor(S.totalP / (S.isFinal ? 2 : 999)) % 2 === 0) ? S.curServTeam : 1 - S.curServTeam;
                return { s: actTeam === 0 ? 'A' : 'C' };
            } else {
                if (!S.isFinal) return { s: S.sOrder[Math.floor(S.totalP / 2) % 2] };
                const blk = Math.floor(S.totalP / 2) % 4;
                return { s: (blk === 0 || blk === 2) ? S.sOrder[blk/2] : S.rOrder[0] };
            }
        }
    </script>
</body>
</html>
