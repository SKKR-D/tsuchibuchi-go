<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TSUCHIBUCHI GO!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <style>
        /* ── COLORS & THEME ── */
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --surface2: #e4e6eb;
            --border: #b0b3b8;
            --text: #1a1a1a;
            --text-dim: #606770;
            --blue: #0060df;
            --blue-dim: #eef4ff;
            --red: #d93025;
            --red-dim: #ffebee;
            --gold: #b38600;
            --gold-bg: #fffbe6;
            --green: #008a45;
            --cyan: #008ba3;
            --app-bg: #e0e0e0;
        }

        body.dark-mode {
            --bg: #0a0e1a;
            --surface: #131929;
            --surface2: #1c2540;
            --border: #2a3a5c;
            --text: #e8eaf6;
            --text-dim: #7986cb;
            --blue: #1e90ff;
            --blue-dim: #0c3d7a;
            --red: #ff4060;
            --red-dim: #7a0c20;
            --gold: #f5c518;
            --gold-bg: #3a2800;
            --green: #00e676;
            --cyan: #00e5ff;
            --app-bg: #000000;
        }

        /* Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* PCやタブレットでの中央寄せのため、bodyを調整 */
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--app-bg);
            color: var(--text);
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── MODAL (Setup & Result) ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-y: auto;
            padding: 16px;
        }

        .modal-overlay.hidden {
            display: none;
        }

        /* 結果画面をスクショしやすくするため、余白を調整 */
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* Setup Steps */
        .step-bar {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .step-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all .3s;
        }

        .step-dot.active {
            background: var(--gold);
            transform: scale(1.3);
        }

        /* Inputs */
        .match-info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-bottom: 4px;
            display: block;
        }

        .name-input {
            width: 100%;
            padding: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.95rem;
        }

        .option-group {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
        }

        .opt-btn {
            flex: 1;
            padding: 12px 4px;
            background: var(--surface2);
            border: 2px solid var(--border);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text);
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-btn:hover {
            filter: brightness(0.95);
        }

        .opt-btn.sel-gold {
            background: var(--gold-bg);
            border-color: var(--gold);
            color: var(--gold);
        }

        .opt-btn.sel-blue {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        .opt-btn.sel-red {
            background: var(--red);
            border-color: var(--red);
            color: #fff;
        }

        .confirm-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--blue), #0060cc);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            margin-top: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .confirm-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 96, 223, 0.3);
        }

        .confirm-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── RESULT SCREEN (Compact for Screenshot) ── */
        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .rh-title {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-weight: 700;
        }

        .rh-winner {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--gold);
        }

        .rh-score {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--text);
        }

        .compact-chart-wrap {
            height: 70px;
            margin-bottom: 8px;
            border: 1px solid var(--border);
            background: var(--surface2);
            border-radius: 6px;
            position: relative;
        }

        #stats-flow-chart {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Compact Tables */
        .compact-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        .compact-table th {
            background: var(--surface2);
            padding: 4px;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .compact-table td {
            padding: 4px;
            border: 1px solid var(--border);
            text-align: center;
            font-weight: 700;
        }

        .ct-name {
            text-align: left;
            padding-left: 6px;
            max-width: 80px;
            overflow: hidden;
            white-space: nowrap;
        }

        /* 2x2 Grid for Detail Cards */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 10px;
        }

        .d-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            overflow: hidden;
        }

        .dc-head {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 900;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 2px;
        }

        .dc-body {
            font-size: 0.65rem;
            line-height: 1.3;
            min-height: 3.6em;
        }

        .chip {
            display: inline-block;
            padding: 1px 5px;
            border-radius: 4px;
            margin: 1px;
            font-size: 0.6rem;
        }

        .cp {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        .cm {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        .share-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .share-btn {
            padding: 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            color: var(--text);
            cursor: pointer;
        }

        .share-btn:hover {
            background: var(--surface2);
        }

        /* Collapsible Game Flow (Hidden by default for screenshot) */
        details.flow-details {
            margin-bottom: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }

        details.flow-details summary {
            padding: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            background: var(--surface2);
            list-style: none;
            cursor: pointer;
            text-align: center;
        }

        .flow-content {
            padding: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .game-flow-row {
            display: flex;
            font-size: 0.7rem;
            margin-bottom: 4px;
            align-items: center;
        }

        .gfr-label {
            width: 40px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .gfr-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
        }

        .dot-s {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            font-size: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .dot-L {
            background: var(--blue);
        }

        .dot-R {
            background: var(--red);
        }

        /* ── GAME SCREEN ── */
        /* PCやタブレットで横幅が広がりすぎないように制約を設ける */
        .app {
            width: 100%;
            max-width: 600px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            padding: 8px 12px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .game-score-display {
            font-family: 'Orbitron', monospace;
            font-size: 2rem;
            font-weight: 900;
        }

        .gs-left {
            color: var(--blue);
        }

        .gs-right {
            color: var(--red);
        }

        .score-area {
            flex: 1;
            display: flex;
            gap: 6px;
            padding: 6px;
            min-height: 0;
        }

        .team-panel {
            flex: 1;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 2px solid transparent;
            background: var(--surface);
            position: relative;
        }

        .team-panel.left {
            border-color: var(--blue);
        }

        .team-panel.right {
            border-color: var(--red);
        }

        .panel-top {
            padding: 6px;
            text-align: center;
            background: rgba(0, 0, 0, 0.03);
            font-weight: 700;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        /* point-display のフォントサイズが15vwだとPCで巨大になるため、固定かコンテナ幅基準に調整 */
        .point-display {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', monospace;
            font-size: clamp(4rem, 15cqi, 6rem);
            container-type: inline-size;
            font-weight: 900;
        }

        .left .point-display {
            color: var(--blue);
        }

        .right .point-display {
            color: var(--red);
        }

        /* Players Buttons */
        .players-box {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 6px;
            background: var(--surface2);
        }

        .p-row {
            display: flex;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            height: 56px;
        }

        .p-info {
            width: 35%;
            padding: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-size: 0.75rem;
            border-right: 1px solid var(--border);
            position: relative;
        }

        .p-role {
            font-size: 0.6rem;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            position: absolute;
            top: 2px;
            left: 2px;
            font-weight: bold;
        }

        .role-s {
            background: var(--gold);
            color: #000;
        }

        .role-r {
            background: var(--cyan);
            color: #000;
        }

        .p-name {
            font-weight: 700;
            margin-left: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .p-btns {
            flex: 1;
            display: flex;
        }

        .act-btn {
            flex: 1;
            border: none;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            transition: 0.1s;
        }

        .act-btn:active {
            opacity: 0.7;
        }

        .act-btn:hover {
            filter: brightness(1.1);
        }

        .btn-p {
            color: #fff;
        }

        .left .btn-p {
            background: var(--blue);
        }

        .right .btn-p {
            background: var(--red);
        }

        .btn-m {
            background: var(--surface);
            color: var(--text-dim);
            border-left: 1px solid var(--border);
        }

        /* Chart & Fault */
        .bottom-area {
            flex-shrink: 0;
            padding: 0 8px 8px;
        }

        .chart-box {
            height: 50px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 6px;
            position: relative;
        }

        #flow-chart {
            width: 100%;
            height: 100%;
            display: block;
        }

        .fault-btn {
            width: 100%;
            padding: 12px;
            background: var(--surface);
            border: 2px solid var(--gold);
            border-radius: 10px;
            color: var(--gold);
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            transition: 0.2s;
        }

        .fault-btn:hover {
            background: var(--gold-bg);
        }

        .fault-btn.warn {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
        }

        .fault-btn.warn:hover {
            filter: brightness(1.1);
        }

        /* Submenu */
        /* モーダルも幅制約に合わせて中央寄せ */
        .submenu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: .2s;
        }

        .submenu-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .submenu-sheet {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 16px;
            max-height: 70vh;
            overflow-y: auto;
            transform: translateY(100%);
            transition: .3s;
        }

        .submenu-overlay.open .submenu-sheet {
            transform: translateY(0);
        }

        .sm-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .sm-btn {
            padding: 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .sm-btn:hover {
            filter: brightness(0.95);
            transform: scale(1.02);
        }

        .sm-back {
            grid-column: span 2;
            padding: 10px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translate(-50%, -20px);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            opacity: 0;
            transition: .3s;
            pointer-events: none;
            font-size: 0.85rem;
            z-index: 300;
        }

        .toast.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }

        @media (max-width: 600px) {

            /* スマホの時は app-bg を消す（全画面になるため） */
            body {
                background: var(--bg);
            }

            .app {
                border-radius: 0;
                box-shadow: none;
            }
        }
    </style>
</head>

<body>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">

            <div id="step-0">
                <h1
                    style="text-align: center; background: linear-gradient(135deg, #ff7b00, #ffc107); -webkit-background-clip: text; background-clip: text; color: transparent; font-family: 'Orbitron', sans-serif; font-size: 3.6rem; font-weight: 900; margin-bottom: 20px; letter-spacing: 2px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3)); line-height: 1.2;">
                    TSUCHIBUCHI GO!</h1>
                <div class="step-bar">
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                </div>
                <p class="input-label">大会情報</p>
                <div class="match-info-grid">
                    <div class="full-width"><input class="name-input" id="meta-tourney" placeholder="大会名"></div>
                    <div><input class="name-input" id="meta-stage" placeholder="回戦"></div>
                    <div><input type="date" class="name-input" id="meta-date"></div>
                </div>
                <p class="input-label">選手登録</p>
                <div class="match-info-grid">
                    <div class="full-width" style="color:var(--blue); font-weight:bold; font-size:0.8rem;">🔵 自チーム (土淵)
                    </div>
                    <input class="name-input" id="n-A" value="選手A" placeholder="後衛"><input class="name-input" id="n-B"
                        value="選手B" placeholder="前衛">
                    <div class="full-width"
                        style="color:var(--red); font-weight:bold; font-size:0.8rem; margin-top:4px;">🔴 相手チーム <input
                            id="team-r-name" placeholder="校名"
                            style="width:100px; font-size:0.8rem; border:none; background:transparent; color: var(--text);">
                    </div>
                    <input class="name-input" id="n-C" value="選手C"><input class="name-input" id="n-D" value="選手D">
                </div>

                <div class="option-group" id="match-opts">
                    <button class="opt-btn" onclick="selMatch(5)">5ゲーム</button>
                    <button class="opt-btn" onclick="selMatch(7)">7ゲーム</button>
                </div>

                <div class="option-group" id="serve-team-opts">
                    <button class="opt-btn" onclick="selServTeam(0)">🔵 土淵S</button>
                    <button class="opt-btn" onclick="selServTeam(1)">🔴 相手S</button>
                </div>

                <button class="confirm-btn" id="btn-start" onclick="confirmStep()" disabled>次へ</button>
            </div>

            <div id="step-1" style="display:none;">
                <div class="step-bar">
                    <div class="step-dot"></div>
                    <div class="step-dot active"></div>
                </div>
                <p style="text-align:center; margin-bottom:10px; font-size:0.9rem;">ポジション確認</p>
                <p class="input-label">🎾 サーバー</p>
                <div class="option-group" id="server-opts"></div>
                <p class="input-label">↗ レシーバー</p>
                <div class="option-group" id="receiver-opts"></div>
                <div
                    style="background:var(--surface2); padding:10px; border-radius:8px; text-align:center; font-size:0.8rem; margin:10px 0;">
                    <div id="court-diag" style="display:flex; justify-content:center; gap:10px; font-weight:bold;">
                    </div>
                </div>
                <button class="confirm-btn" onclick="confirmStep()">ゲーム開始</button>
            </div>

            <div id="step-2" style="display:none;">
                <div class="result-header">
                    <div>
                        <div class="rh-title">WINNER</div>
                        <div class="rh-winner" id="winner-name">TSUCHIBUCHI</div>
                    </div>
                    <div class="rh-score" id="winner-score">4 - 2</div>
                </div>

                <div class="compact-chart-wrap">
                    <canvas id="stats-flow-chart"></canvas>
                </div>

                <table class="compact-table" id="res-score-tbl">
                </table>

                <table class="compact-table">
                    <thead>
                        <tr style="background:var(--surface2);">
                            <th>選手</th>
                            <th>得点</th>
                            <th>ミス</th>
                            <th>1st%</th>
                        </tr>
                    </thead>
                    <tbody id="res-stats-tbl"></tbody>
                </table>

                <div class="detail-grid" id="detail-cards"></div>

                <details class="flow-details">
                    <summary>スコア詳細を見る</summary>
                    <div class="flow-content" id="game-flow-list"></div>
                </details>

                <div class="share-row">
                    <button class="share-btn" onclick="downloadJSON()">💾 保存</button>
                    <button class="share-btn" onclick="resetMatch()">🔄 新試合</button>
                </div>
            </div>

        </div>
    </div>

    <div class="app" id="main-app">
        <div class="header">
            <div style="font-size:0.8rem; font-weight:bold;" id="game-info">G1</div>
            <div class="game-score-display"><span class="gs-left" id="gs-L">0</span>-<span class="gs-right"
                    id="gs-R">0</span></div>
            <div style="display:flex; gap:8px;">
                <button onclick="undo()"
                    style="background:none; border:none; font-size:1.2rem; cursor:pointer;">↩️</button>
            </div>
        </div>

        <div class="score-area">
            <div class="team-panel left">
                <div class="panel-top" id="tname-L">土淵</div>
                <div class="point-display" id="pt-L">0</div>
                <div class="players-box">
                    <div class="p-row" id="row-A">
                        <div class="p-info"><span class="p-role" id="role-A"></span><span class="p-name"
                                id="nm-A"></span></div>
                        <div class="p-btns"><button class="act-btn btn-p" onclick="act('L','A','p')">得点</button><button
                                class="act-btn btn-m" onclick="act('L','A','m')">ミス</button></div>
                    </div>
                    <div class="p-row" id="row-B">
                        <div class="p-info"><span class="p-role" id="role-B"></span><span class="p-name"
                                id="nm-B"></span></div>
                        <div class="p-btns"><button class="act-btn btn-p" onclick="act('L','B','p')">得点</button><button
                                class="act-btn btn-m" onclick="act('L','B','m')">ミス</button></div>
                    </div>
                </div>
            </div>
            <div class="team-panel right">
                <div class="panel-top" id="tname-R">相手</div>
                <div class="point-display" id="pt-R">0</div>
                <div class="players-box">
                    <div class="p-row" id="row-C">
                        <div class="p-info"><span class="p-role" id="role-C"></span><span class="p-name"
                                id="nm-C"></span></div>
                        <div class="p-btns"><button class="act-btn btn-p" onclick="act('R','C','p')">得点</button><button
                                class="act-btn btn-m" onclick="act('R','C','m')">ミス</button></div>
                    </div>
                    <div class="p-row" id="row-D">
                        <div class="p-info"><span class="p-role" id="role-D"></span><span class="p-name"
                                id="nm-D"></span></div>
                        <div class="p-btns"><button class="act-btn btn-p" onclick="act('R','D','p')">得点</button><button
                                class="act-btn btn-m" onclick="act('R','D','m')">ミス</button></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-area">
            <div class="chart-box"><canvas id="flow-chart"></canvas></div>
            <button class="fault-btn" id="fault-btn" onclick="handleFault()">FAULT</button>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>

    <div class="submenu-overlay" id="submenu">
        <div class="submenu-sheet">
            <div style="text-align:center; font-weight:bold; margin-bottom:10px;" id="sm-title">詳細</div>
            <div class="sm-grid" id="sm-body"></div>
        </div>
    </div>

    <script>
        // ── DATA & STATE ──
        let S = {
            maxG: 5, winG: 3, gL: 0, gR: 0, pL: 0, pR: 0, totalP: 0, fault: 0, isFinal: false,
            startTeam: null, curServTeam: null, sOrder: [], rOrder: [],
            names: { A: '選手A', B: '選手B', C: '選手C', D: '選手D' },
            teams: { L: '土淵', R: '相手' },
            meta: { tourney: '', stage: '', date: '' },
            stats: { A: { p: 0, m: 0, fi: 0, st: 0, pt: {}, mt: {} }, B: { p: 0, m: 0, fi: 0, st: 0, pt: {}, mt: {} }, C: { p: 0, m: 0, fi: 0, st: 0, pt: {}, mt: {} }, D: { p: 0, m: 0, fi: 0, st: 0, pt: {}, mt: {} } },
            hist: [], log: []
        };
        let historyStack = [];
        let setupStep = 0;

        // ── INIT ──
        window.onload = () => { document.getElementById('meta-date').valueAsDate = new Date(); };

        function selMatch(n) { S.maxG = n; S.winG = (n === 5) ? 3 : 4; upBtns('match-opts', n === 5 ? 0 : 1); checkS0(); }
        function selServTeam(t) { S.startTeam = t; S.curServTeam = t; upBtns('serve-team-opts', t); checkS0(); }

        function upBtns(id, idx) {
            const el = document.getElementById(id);
            if (!el) return;
            el.querySelectorAll('.opt-btn').forEach((b, i) =>
                b.className = `opt-btn ${i === idx ? (idx === 0 ? 'sel-blue' : (id.includes('serv') ? 'sel-red' : 'sel-gold')) : ''}`
            );
        }

        function checkS0() { document.getElementById('btn-start').disabled = !(S.maxG && S.startTeam !== null); }

        function confirmStep() {
            if (setupStep === 0) {
                ['A', 'B', 'C', 'D'].forEach(p => S.names[p] = document.getElementById('n-' + p).value || S.names[p]);
                S.teams.R = document.getElementById('team-r-name').value || '相手';
                S.meta.tourney = document.getElementById('meta-tourney').value;
                S.meta.stage = document.getElementById('meta-stage').value;
                step(1);
            } else if (setupStep === 1) {
                document.getElementById('modal').classList.add('hidden');
                update();
            }
        }
        function step(n) {
            document.getElementById('step-' + setupStep).style.display = 'none';
            setupStep = n;
            document.getElementById('step-' + setupStep).style.display = 'block';
            if (n === 1) buildPos();
        }

        function buildPos() {
            const sSide = S.curServTeam === 0 ? ['A', 'B'] : ['C', 'D'];
            const rSide = S.curServTeam === 0 ? ['C', 'D'] : ['A', 'B'];
            S.sOrder = [sSide[0], sSide[1]]; S.rOrder = [rSide[0], rSide[1]];

            const mkBtn = (id, list, def) => {
                const el = document.getElementById(id); el.innerHTML = '';
                list.forEach(p => {
                    const b = document.createElement('button'); b.className = `opt-btn ${p === def ? 'sel-gold' : ''}`; b.textContent = S.names[p];
                    b.onclick = () => {
                        if (id.includes('server')) S.sOrder = [p, list.find(x => x !== p)];
                        else S.rOrder = [p, list.find(x => x !== p)];
                        mkBtn(id, list, p); updDiag();
                    };
                    el.appendChild(b);
                });
            };
            mkBtn('server-opts', sSide, sSide[0]); mkBtn('receiver-opts', rSide, rSide[0]);
            updDiag();
        }
        function updDiag() {
            document.getElementById('court-diag').textContent = `S:${S.names[S.sOrder[0]]} / R:${S.names[S.rOrder[0]]}`;
        }

        // ── CORE LOGIC ──
        function getServ() {
            if (!S.isFinal) {
                return { s: S.sOrder[Math.floor(S.totalP / 2) % 2], r: S.rOrder[S.totalP % 2], t: S.curServTeam };
            } else {
                const blk = Math.floor(S.totalP / 2) % 4, pb = S.totalP % 2;
                if (blk === 0) return { s: S.sOrder[0], r: S.rOrder[pb], t: S.curServTeam };
                if (blk === 1) return { s: S.rOrder[0], r: S.sOrder[pb], t: 1 - S.curServTeam };
                if (blk === 2) return { s: S.sOrder[1], r: S.rOrder[pb], t: S.curServTeam };
                return { s: S.rOrder[1], r: S.sOrder[pb], t: 1 - S.curServTeam };
            }
        }

        // Action & Submenu
        let _act = {};
        function act(side, p, type) { _act = { side, p, type }; showSM(type, p); }
        function commit(sub) {
            historyStack.push(JSON.stringify(S));
            const { side, p, type } = _act;
            const inf = getServ();

            if (S.fault === 0 && inf.s) { S.stats[inf.s].fi++; S.stats[inf.s].st++; }

            if (type === 'p') {
                S.stats[p].p++; if (sub) S.stats[p].pt[sub] = (S.stats[p].pt[sub] || 0) + 1;
                S.hist.push(side); side === 'L' ? S.pL++ : S.pR++;
            } else {
                S.stats[p].m++; if (sub) S.stats[p].mt[sub] = (S.stats[p].mt[sub] || 0) + 1;
                S.hist.push(side === 'L' ? 'R' : 'L'); side === 'L' ? S.pR++ : S.pL++;
            }

            S.fault = 0; S.totalP++;
            checkEnd();
            document.getElementById('submenu').classList.remove('open');
            update();
        }

        function handleFault() {
            const inf = getServ();
            if (S.fault === 0) {
                S.fault = 1; S.stats[inf.s].st++;
                document.getElementById('fault-btn').textContent = "2nd SERVICE";
                document.getElementById('fault-btn').classList.add('warn');
            } else {
                historyStack.push(JSON.stringify(S));
                S.fault = 0; S.stats[inf.s].m++; S.stats[inf.s].mt['df'] = (S.stats[inf.s].mt['df'] || 0) + 1;
                S.hist.push(inf.t === 0 ? 'R' : 'L'); inf.t === 0 ? S.pR++ : S.pL++; S.totalP++;
                checkEnd(); update();
            }
        }

        function checkEnd() {
            const L = S.pL, R = S.pR, fin = S.isFinal;
            const win = (L >= (fin ? 7 : 4) && L - R >= 2) ? 'L' : (R >= (fin ? 7 : 4) && R - L >= 2) ? 'R' : null;

            if (win) {
                S.log.push({ n: S.gL + S.gR + 1, L: S.pL, R: S.pR, w: win, flow: [...S.hist], fin });
                win === 'L' ? S.gL++ : S.gR++;
                S.pL = 0; S.pR = 0; S.totalP = 0; S.hist = [];
                if (S.gL === S.winG || S.gR === S.winG) showResult();
                else {
                    S.curServTeam = 1 - S.curServTeam;
                    if ((S.gL + S.gR) === S.maxG - 1) S.isFinal = true;
                    alert('チェンジサービス / サイズ');
                    step(1); document.getElementById('modal').classList.remove('hidden');
                }
            }
        }

        function undo() {
            if (historyStack.length) { S = JSON.parse(historyStack.pop()); update(); }
        }

        // ── UI UPDATE ──
        function update() {
            const inf = getServ();
            document.getElementById('gs-L').textContent = S.gL; document.getElementById('gs-R').textContent = S.gR;
            const d = getDisp(S.pL, S.pR, S.isFinal);
            document.getElementById('pt-L').textContent = d.l; document.getElementById('pt-R').textContent = d.r;
            document.getElementById('game-info').textContent = S.isFinal ? 'FINAL' : `G${S.gL + S.gR + 1}`;

            ['A', 'B', 'C', 'D'].forEach(p => {
                document.getElementById('nm-' + p).textContent = S.names[p];
                document.getElementById('role-' + p).className = `p-role ${p === inf.s ? 'role-s' : (p === inf.r ? 'role-r' : '')}`;
                document.getElementById('role-' + p).textContent = p === inf.s ? 'S' : (p === inf.r ? 'R' : '');
            });

            if (S.fault === 0) {
                document.getElementById('fault-btn').textContent = "FAULT";
                document.getElementById('fault-btn').classList.remove('warn');
            }
            drawChart('flow-chart', S.hist, S.isFinal);
        }

        function getDisp(l, r, fin) {
            const border = fin ? 6 : 3;
            if (l < border && r < border) return { l, r };
            if (l === r) return { l: 'D', r: 'D' };
            if (l > r) return { l: 'A', r: 'D' };
            return { l: 'D', r: 'A' };
        }

        // ── RESULT & CHARTS ──
        function showResult() {
            const winName = S.gL > S.gR ? S.teams.L : S.teams.R;
            document.getElementById('winner-name').textContent = winName;
            document.getElementById('winner-score').textContent = `${S.gL} - ${S.gR}`;

            const tbl = document.getElementById('res-score-tbl');
            let h = `<tr><th></th>${S.log.map((g, i) => `<th>G${i + 1}</th>`).join('')}<th>計</th></tr>`;
            h += `<tr><td class="ct-name" style="color:var(--blue)">${S.teams.L}</td>${S.log.map(g => `<td>${g.L}</td>`).join('')}<td>${S.gL}</td></tr>`;
            h += `<tr><td class="ct-name" style="color:var(--red)">${S.teams.R}</td>${S.log.map(g => `<td>${g.R}</td>`).join('')}<td>${S.gR}</td></tr>`;
            tbl.innerHTML = h;

            const stTbl = document.getElementById('res-stats-tbl'); stTbl.innerHTML = '';
            ['A', 'B', 'C', 'D'].forEach(p => {
                const s = S.stats[p];
                const rate = s.st > 0 ? Math.round(s.fi / s.st * 100) + '%' : '-';
                const row = `<tr><td class="ct-name">${S.names[p]}</td><td>${s.p}</td><td>${s.m}</td><td>${rate}</td></tr>`;
                if (p === 'C') stTbl.innerHTML += `<tr style="border-top:2px solid var(--border)"><td colspan="4" style="height:2px;padding:0;background:var(--border);"></td></tr>`;
                stTbl.innerHTML += row;
            });

            const cards = document.getElementById('detail-cards'); cards.innerHTML = '';
            ['A', 'B', 'C', 'D'].forEach(p => {
                const s = S.stats[p];
                const topP = Object.entries(s.pt).map(([k, v]) => `<span class="chip cp">${getLbl(k)}:${v}</span>`).join('');
                const topM = Object.entries(s.mt).map(([k, v]) => `<span class="chip cm">${getLbl(k)}:${v}</span>`).join('');
                cards.innerHTML += `<div class="d-card"><div class="dc-head"><span style="color:${'AB'.includes(p) ? 'var(--blue)' : 'var(--red)'}">${S.names[p]}</span><span>+${s.p} / -${s.m}</span></div><div class="dc-body">${topP || '-'}<br>${topM || '-'}</div></div>`;
            });

            const flowDiv = document.getElementById('game-flow-list'); flowDiv.innerHTML = '';
            S.log.forEach((g, i) => {
                const pts = g.flow.map(x => `<div class="dot-s ${x === 'L' ? 'dot-L' : 'dot-R'}">${x}</div>`).join('');
                flowDiv.innerHTML += `<div class="game-flow-row"><div class="gfr-label">G${i + 1}</div><div class="gfr-dots">${pts}</div></div>`;
            });

            step(2); document.getElementById('modal').classList.remove('hidden');
            setTimeout(() => {
                const allPts = S.log.flatMap(g => g.flow);
                drawChart('stats-flow-chart', allPts, false);
            }, 100);
        }

        // ── SUBMENU & LABELS ──
        const MENUS = {
            p: [
                { k: 'ace', l: 'SA', i: '🎯' }, { k: 'smash', l: 'Smash', i: '💥' },
                { k: 'volley_f', l: 'F-Volley', i: '🟦' }, { k: 'volley_b', l: 'B-Volley', i: '🟪' },
                { k: 'stroke_f', l: 'F-Stroke', i: '🟦' }, { k: 'stroke_b', l: 'B-Stroke', i: '🟪' },
                { k: 'attack', l: 'Attack', i: '⚡' }
            ],
            m: [
                { k: 'net', l: 'Net', i: '🔴' }, { k: 'out', l: 'Out', i: '↔' },
                { k: 'smash', l: 'Smash', i: '💨' },
                { k: 'recv', l: 'Recv Miss', i: '🎾', sub: true }
            ],
            m_recv: [
                { k: 'recv_net', l: 'RM Net', i: '🔴' }, { k: 'recv_out', l: 'RM Out', i: '↔' },
                { k: 'recv_ace', l: 'SA Recv', i: '⚡' }
            ]
        };

        function showSM(type, p) {
            const sm = document.getElementById('sm-body'); sm.innerHTML = '';
            const list = MENUS[type] || MENUS['p'];
            document.getElementById('sm-title').textContent = type === 'p' ? '得点内容' : 'ミス内容';

            const inf = getServ();
            const isS = p === inf.s;

            list.forEach(item => {
                if (item.k === 'ace' && !isS) return;
                const b = document.createElement('button'); b.className = 'sm-btn';
                b.innerHTML = `<div style="font-size:1.5rem">${item.i}</div><div>${item.l}</div>`;
                b.onclick = () => {
                    if (item.sub) showSM('m_recv', p);
                    else commit(item.k);
                };
                sm.appendChild(b);
            });

            if (type.includes('_')) {
                const back = document.createElement('button'); back.className = 'sm-back'; back.textContent = '戻る';
                back.onclick = () => showSM('m', p); sm.appendChild(back);
            }

            document.getElementById('submenu').classList.add('open');
        }

        function getLbl(k) {
            const map = { ace: 'SA', smash: 'Smash', volley_f: 'FV', volley_b: 'BV', stroke_f: 'FST', stroke_b: 'BST', net: 'Net', out: 'Out', df: 'DF', recv_net: 'RM-N', recv_out: 'RM-O', recv_ace: 'RM-SA' };
            return map[k] || k;
        }

        // ── UTILS (高解像度対応とリサイズ時の再描画対応) ──
        function drawChart(id, hist, fin) {
            const cvs = document.getElementById(id); if (!cvs) return;
            const ctx = cvs.getContext('2d');

            const dpr = window.devicePixelRatio || 1;
            const rect = cvs.getBoundingClientRect();
            cvs.width = rect.width * dpr;
            cvs.height = rect.height * dpr;
            ctx.scale(dpr, dpr);

            const w = rect.width; const h = rect.height;
            const pts = [0]; let c = 0; hist.forEach(x => { c += (x === 'L' ? 1 : -1); pts.push(c); });

            const absMax = Math.max(fin ? 7 : 4, ...pts.map(Math.abs));

            const mid = h / 2;
            const sc = (mid - 6) / absMax;
            const step = (w - 10) / (pts.length || 1);

            ctx.beginPath(); ctx.strokeStyle = '#ccc'; ctx.moveTo(0, mid); ctx.lineTo(w, mid); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
            pts.forEach((y, x) => { x === 0 ? ctx.moveTo(5, mid - y * sc) : ctx.lineTo(5 + x * step, mid - y * sc); });
            ctx.stroke();
        }

        window.addEventListener('resize', () => {
            if (S.totalP > 0) update();
            if (setupStep === 2) {
                const allPts = S.log.flatMap(g => g.flow);
                drawChart('stats-flow-chart', allPts, false);
            }
        });

        function downloadJSON() {
            const b = new Blob([JSON.stringify(S, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'match_data.json'; a.click();
        }
        function resetMatch() { if (confirm('リセットしますか？')) location.reload(); }

    </script>
</body>

</html>
